---
# Starship Prompt (Debian/macOS only - Arch uses Powerlevel10k)
starship_version: "1.24.2"
starsip_install_directory: "/usr/local/bin"

# Apps and Packages (cross-platform)
packages:
  - bash
  - bat
  - bc
  - btop
  - cmake
  - coreutils
  - curl
  - direnv
  - fastfetch
  - fzf
  - htop
  - gawk
  - gettext
  - git
  - jq
  - just
  - playerctl
  - ripgrep
  - tmux
  - tree
  - zsh
  - zoxide

ubuntu_packages:
  - autoconf
  - automake
  - build-essential
  - cmake
  - dnsutils
  - doxygen
  - g++
  - libfreetype6
  - libfontconfig1-dev
  - libreadline-dev
  - libxcb-xfixes0-dev
  - libxkbcommon-dev
  - libtool
  - libtool-bin
  - lua5.4
  - liblua5.4-dev
  - ninja-build
  - pkg-config
  - python3
  - unzip
  - xsel

arch_packages:
  - base-devel
  - bind
  - bitwarden-cli
  - ghostty
  - lua
  - luarocks
  - neovim
  - python
  - ttf-jetbrains-mono-nerd
  - unzip
  - wl-clipboard
  - xsel
  - zsh-theme-powerlevel10k

apps:
  - notion
  - slack

mac_apps:
  - alfred
  - rectangle
